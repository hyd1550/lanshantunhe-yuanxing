<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>竞对企业维护</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0efe9;--border:#e2e0da;--border2:#c8c6bc;
  --text:#1a1a18;--text2:#6b6960;--text3:#9c9a90;
  --blue:#185FA5;--blue-bg:#E6F1FB;--teal:#0F6E56;--teal-bg:#E1F5EE;
  --amber:#8A5A0B;--amber-bg:#FAEEDA;--green:#27500A;--green-bg:#EAF3DE;--red:#A32D2D;--red-bg:#FCEBEB;
}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;font-size:13px;color:var(--text);background:var(--bg2)}
.app{width:1660px;height:990px;background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;position:relative}

.tbar{flex-shrink:0;height:50px;display:flex;align-items:center;gap:10px;padding:0 22px;background:var(--bg);border-bottom:1px solid var(--border)}
.crumb{font-size:12.5px;color:var(--text3)}
.crumb b{color:var(--text);font-weight:600;font-size:14px}
.sp{flex:1}
.roletog{display:flex;border:1px solid var(--border2);border-radius:99px;overflow:hidden;font-size:12px}
.roletog span{padding:5px 12px;cursor:pointer;color:var(--text2)}
.roletog span.on{background:var(--blue);color:#fff}
.roview{font-size:12px;color:var(--amber);background:var(--amber-bg);border-radius:99px;padding:3px 10px}

.tools{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:14px 22px 10px;flex-wrap:wrap}
.search{display:flex;align-items:center;gap:8px;height:36px;padding:0 12px;border:1px solid var(--border2);border-radius:7px;background:var(--bg);width:300px}
.search input{border:none;outline:none;flex:1;font-size:13px;font-family:inherit;background:transparent;color:var(--text)}
.fsel{height:36px;padding:0 10px;border:1px solid var(--border2);border-radius:7px;background:var(--bg);font-family:inherit;font-size:12.5px;color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;font-size:12.5px;border:1px solid var(--border2);border-radius:7px;background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.pri:hover{opacity:.9}

.stats{flex-shrink:0;display:flex;gap:14px;padding:2px 22px 12px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 18px;min-width:130px}
.stat .n{font-size:20px;font-weight:600}
.stat .l{font-size:11.5px;color:var(--text3);margin-top:2px}

.tblwrap{overflow:auto;margin:0 22px 10px;border:1px solid var(--border);border-radius:10px;background:var(--bg)}
.pager{display:flex;align-items:center;gap:6px;margin:0 22px 16px;font-size:12.5px}
.pager .psp{flex:1}
.pg-info{color:var(--text3)}
.pg{min-width:30px;height:30px;padding:0 9px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);cursor:pointer}
.pg:hover{background:var(--bg2)}
.pg.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.pg.dis{color:var(--text3);cursor:default;background:var(--bg2)}
table.t{width:100%;border-collapse:collapse;font-size:12.5px}
table.t th,table.t td{padding:16px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
table.t thead th{position:sticky;top:0;background:var(--bg2);color:var(--text2);font-weight:600;font-size:11.5px;z-index:1}
table.t tbody tr:hover{background:var(--bg2)}
table.t tr:last-child td{border-bottom:none}
.pill{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500}
.tag-key{background:var(--amber-bg);color:var(--amber)}
.tag-nor{background:var(--bg3);color:var(--text2)}
.st-on{background:var(--green-bg);color:var(--green)}
.st-off{background:var(--bg3);color:var(--text3)}
.act{color:var(--blue);cursor:pointer;margin-right:14px}
.act:hover{text-decoration:underline}
.act.off{color:var(--red)}
.muted{color:var(--text3)}
.ename{font-weight:500}

.ov{position:absolute;inset:0;background:rgba(20,25,35,.5);display:none;align-items:center;justify-content:center;z-index:60}
.ov.show{display:flex}
.modal{background:var(--bg);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;max-height:88%;width:560px}
.mhd{display:flex;align-items:center;gap:10px;padding:15px 20px;border-bottom:1px solid var(--border)}
.mhd h3{font-size:15px;font-weight:600;flex:1}
.mx{cursor:pointer;color:var(--text2);width:28px;height:28px;border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center}
.mbody{overflow-y:auto;padding:16px 20px}
.mft{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.msearch{display:flex;align-items:center;gap:8px;height:36px;padding:0 12px;border:1px solid var(--border2);border-radius:7px;margin-bottom:8px}
.msearch input{border:none;outline:none;flex:1;font-size:13px;font-family:inherit;background:transparent;color:var(--text)}
.slist{max-height:340px;overflow-y:auto}
.srow{display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:8px;cursor:pointer}
.srow:hover{background:var(--bg2)}
.sck{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;flex-shrink:0}
.srow.on .sck{background:var(--blue);border-color:var(--blue)}
.sinfo{flex:1;min-width:0}
.sname{font-size:13px;font-weight:500}
.smeta{font-size:11px;color:var(--text3);margin-top:1px}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.fr input,.fr select,.fr textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border2);border-radius:7px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.toast{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 16px;border-radius:6px;font-size:12.5px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="tbar">
    <span class="crumb">工作台 / 数据维护 / </span><b class="crumb"><b>竞对企业维护</b></b>
    <span class="sp"></span>
    <span id="rolebox"></span>
  </div>

  <div class="tools">
    <div class="search"><span style="color:var(--text3)">🔍</span><input id="q" placeholder="搜索企业名称 / 信用代码 / 赛道…" oninput="resetPage()"></div>
    <select class="fsel" id="ftrack" onchange="resetPage()"><option value="">全部赛道</option></select>
    <select class="fsel" id="ftag" onchange="resetPage()"><option value="">全部标签</option><option>重点竞对</option><option>一般竞对</option></select>
    <select class="fsel" id="fstat" onchange="resetPage()"><option value="">全部状态</option><option>启用</option><option>停用</option></select>
    <span class="sp"></span>
    <span id="adminbtns"></span>
  </div>

  <div class="stats" id="stats"></div>

  <div class="tblwrap">
    <table class="t">
      <thead><tr>
        <th>企业名称</th><th>统一社会信用代码</th><th>所属赛道 / 主营产品</th><th>标签</th><th>状态</th><th>维护人</th><th>更新时间</th><th id="opth">操作</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="pager" id="pager"></div>

  <!-- add modal -->
  <div class="ov" id="addov"><div class="modal">
    <div class="mhd"><h3>从企业主数据添加竞对企业</h3><div class="mx" onclick="closeAdd()">✕</div></div>
    <div class="mbody">
      <div class="msearch"><span style="color:var(--text3)">🔍</span><input id="asearch" placeholder="搜索企业主数据…" oninput="renderAdd(this.value)"></div>
      <div class="slist" id="alist"></div>
      <div class="fr" style="margin-top:12px"><label>标签</label><select id="atag"><option>一般竞对</option><option>重点竞对</option></select></div>
    </div>
    <div class="mft"><span id="acnt" style="margin-right:auto;font-size:12px;color:var(--text3)"></span><button class="btn" onclick="closeAdd()">取消</button><button class="btn pri" onclick="confirmAdd()">加入竞对库</button></div>
  </div></div>

  <!-- edit modal -->
  <div class="ov" id="editov"><div class="modal" style="width:460px">
    <div class="mhd"><h3>编辑竞对企业</h3><div class="mx" onclick="closeEdit()">✕</div></div>
    <div class="mbody">
      <div class="fr"><label>企业名称</label><input id="ename" disabled></div>
      <div class="fr"><label>标签</label><select id="etag"><option>一般竞对</option><option>重点竞对</option></select></div>
      <div class="fr"><label>备注</label><textarea id="enote" rows="2" placeholder="选填"></textarea></div>
    </div>
    <div class="mft"><span class="sp"></span><button class="btn" onclick="closeEdit()">取消</button><button class="btn pri" onclick="saveEdit()">保存</button></div>
  </div></div>

  <div class="toast" id="toast"></div>
</div>

<script>
let role='admin';
const MASTER=[
 {id:'jf',name:'金发科技股份有限公司',code:'914401011922038822',track:'PBAT/PBS/PLA·改性塑料'},
 {id:'hl',name:'恒力石化股份有限公司',code:'9132059479661234X5',track:'PBAT·聚酯·化纤'},
 {id:'wh',name:'万华化学集团股份有限公司',code:'91370600264180542K',track:'PBAT/PLA/BDO·基础化工'},
 {id:'tc',name:'彤程新材料集团股份有限公司',code:'913100006073157XXJ',track:'PBAT/PLA·改性料'},
 {id:'jd',name:'金丹科技股份有限公司',code:'91411625757911423N',track:'乳酸·丙交酯·PLA'},
 {id:'zl',name:'中粮生物科技股份有限公司',code:'91340300148900000X',track:'PLA·燃料乙醇·淀粉糖'},
 {id:'dh',name:'江苏丹化科技有限公司',code:'913205820558766000',track:'BDO·草酸·PBAT'},
 {id:'hf',name:'华峰集团有限公司',code:'913303005584130000',track:'TPU·氨纶·PBAT'},
 {id:'de',name:'山东道恩高分子材料股份有限公司',code:'913706850736000000',track:'改性PP·PBAT改性料'},
 {id:'ch',name:'浙江长鸿高科新材料股份有限公司',code:'913302001234500000',track:'PBAT·SEBS'},
 {id:'lh',name:'联泓新材料科技股份有限公司',code:'913704810567800000',track:'EVA·PLA·特种化学品'},
 {id:'lj',name:'北京蓝晶微生物科技有限公司',code:'91110113MA01ABCDEF',track:'PHA·合成生物'},
 {id:'kh',name:'营口康辉石化有限公司',code:'912108810789000000',track:'PBAT/PBS·膜级'},
 {id:'rf',name:'山东瑞丰高分子材料股份有限公司',code:'913715810456700000',track:'PVC助剂·PBAT'},
 {id:'zw',name:'珠海万通化工有限公司',code:'914404000678900000',track:'PBAT/PBS·改性'},
 {id:'yt',name:'安徽悦泰生物科技有限公司',code:'91340100MA2R000000',track:'PGA·PLA'},
 {id:'bs',name:'巴斯夫（中国）有限公司',code:'913100001320999999',track:'ecoflex（PBAT）·外资'},
 {id:'nm',name:'诺瓦蒙特（Novamont）',code:'—（境外）',track:'Mater-Bi·外资'},
];
// 竞对库：初始收录
let lib=[
 {id:'jf',tag:'重点竞对',status:'启用',owner:'统一管理员',updated:'2026-06-18',note:''},
 {id:'hl',tag:'重点竞对',status:'启用',owner:'统一管理员',updated:'2026-06-18',note:''},
 {id:'wh',tag:'重点竞对',status:'启用',owner:'统一管理员',updated:'2026-06-20',note:''},
 {id:'tc',tag:'一般竞对',status:'启用',owner:'统一管理员',updated:'2026-06-20',note:''},
 {id:'jd',tag:'一般竞对',status:'启用',owner:'统一管理员',updated:'2026-06-22',note:''},
 {id:'zl',tag:'一般竞对',status:'启用',owner:'统一管理员',updated:'2026-06-22',note:''},
 {id:'dh',tag:'一般竞对',status:'停用',owner:'统一管理员',updated:'2026-05-30',note:'暂不监测'},
 {id:'hf',tag:'一般竞对',status:'启用',owner:'统一管理员',updated:'2026-06-25',note:''},
 {id:'de',tag:'一般竞对',status:'启用',owner:'统一管理员',updated:'2026-06-25',note:''},
 {id:'lj',tag:'重点竞对',status:'启用',owner:'统一管理员',updated:'2026-07-02',note:'PHA新赛道'},
 {id:'kh',tag:'一般竞对',status:'启用',owner:'统一管理员',updated:'2026-07-05',note:''},
 {id:'bs',tag:'重点竞对',status:'启用',owner:'统一管理员',updated:'2026-07-05',note:'外资对标'},
];
const M=id=>MASTER.find(m=>m.id===id);
let addBuf=[],editId=null;
const pageSize=10;let page=1;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1900)}

function renderRole(){
  document.getElementById('adminbtns').innerHTML=`<button class="btn pri" onclick="openAdd()">＋ 从企业主数据添加</button>`;
}

function initTrackFilter(){
  const tracks=[...new Set(lib.map(x=>M(x.id).track.split('·')[0]))];
  document.getElementById('ftrack').innerHTML='<option value="">全部赛道</option>'+tracks.map(t=>`<option>${t}</option>`).join('');
}
function resetPage(){page=1;render()}
function gotoPage(p){page=p;render()}
function renderPager(total,pages){
  let nums='';for(let i=1;i<=pages;i++)nums+=`<span class="pg${i===page?' on':''}" onclick="gotoPage(${i})">${i}</span>`;
  document.getElementById('pager').innerHTML=`<span class="pg-info">共 ${total} 条，每页 ${pageSize} 条</span><span class="psp"></span><span class="pg${page<=1?' dis':''}" ${page<=1?'':`onclick="gotoPage(${page-1})"`}>上一页</span>${nums}<span class="pg${page>=pages?' dis':''}" ${page>=pages?'':`onclick="gotoPage(${page+1})"`}>下一页</span>`;
}
function render(){
  const q=document.getElementById('q').value.trim();
  const ft=document.getElementById('ftrack').value,fg=document.getElementById('ftag').value,fs=document.getElementById('fstat').value;
  let rows=lib.filter(x=>{const m=M(x.id);
    if(q&&!(m.name.includes(q)||m.code.includes(q)||m.track.includes(q)))return false;
    if(ft&&!m.track.startsWith(ft))return false;
    if(fg&&x.tag!==fg)return false;
    if(fs&&x.status!==fs)return false;
    return true;});
  const total=rows.length,pages=Math.max(1,Math.ceil(total/pageSize));
  if(page>pages)page=pages;if(page<1)page=1;
  const pageRows=rows.slice((page-1)*pageSize,page*pageSize);
  renderPager(total,pages);
  document.getElementById('tbody').innerHTML=pageRows.map(x=>{const m=M(x.id);
    const ops=role==='admin'
      ? `<span class="act" onclick="openEdit('${x.id}')">编辑</span>`+(x.status==='启用'?`<span class="act off" onclick="toggle('${x.id}')">停用</span>`:`<span class="act" onclick="toggle('${x.id}')">启用</span>`)
      : '<span class="muted">—</span>';
    return `<tr>
      <td class="ename">${m.name}</td>
      <td class="muted">${m.code}</td>
      <td>${m.track}</td>
      <td><span class="pill ${x.tag==='重点竞对'?'tag-key':'tag-nor'}">${x.tag}</span></td>
      <td><span class="pill ${x.status==='启用'?'st-on':'st-off'}">${x.status}</span></td>
      <td>${x.owner}</td>
      <td class="muted">${x.updated}</td>
      <td>${ops}</td>
    </tr>`;
  }).join('')||`<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:40px">无匹配的竞对企业</td></tr>`;
  const en=lib.filter(x=>x.status==='启用').length,key=lib.filter(x=>x.tag==='重点竞对'&&x.status==='启用').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="n">${lib.length}</div><div class="l">竞对企业总数</div></div>
    <div class="stat"><div class="n">${en}</div><div class="l">启用中（进入监测/对标）</div></div>
    <div class="stat"><div class="n">${key}</div><div class="l">重点竞对</div></div>`;
}

/* add */
function openAdd(){addBuf=[];document.getElementById('asearch').value='';renderAdd('');document.getElementById('addov').classList.add('show')}
function closeAdd(){document.getElementById('addov').classList.remove('show')}
function renderAdd(q){q=(q||'').trim();const inlib=new Set(lib.map(x=>x.id));
  document.getElementById('alist').innerHTML=MASTER.filter(m=>!inlib.has(m.id)&&(!q||m.name.includes(q)||m.track.includes(q))).map(m=>{
    const on=addBuf.includes(m.id);
    return `<div class="srow${on?' on':''}" onclick="addToggle('${m.id}')"><span class="sck">${on?'✓':''}</span><div class="sinfo"><div class="sname">${m.name}</div><div class="smeta">${m.track} ｜ ${m.code}</div></div></div>`;
  }).join('')||'<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">主数据中暂无可添加的企业</div>';
  document.getElementById('acnt').textContent=`已选 ${addBuf.length} 家`;
}
function addToggle(id){addBuf.includes(id)?addBuf=addBuf.filter(x=>x!==id):addBuf.push(id);renderAdd(document.getElementById('asearch').value)}
function confirmAdd(){if(!addBuf.length){toast('请选择要加入的企业');return}
  const tag=document.getElementById('atag').value;
  addBuf.forEach(id=>lib.push({id,tag,status:'启用',owner:'统一管理员',updated:'今天',note:''}));
  closeAdd();initTrackFilter();render();toast('已加入 '+addBuf.length+' 家竞对企业');
}
/* edit */
function openEdit(id){editId=id;const x=lib.find(l=>l.id===id);document.getElementById('ename').value=M(id).name;document.getElementById('etag').value=x.tag;document.getElementById('enote').value=x.note||'';document.getElementById('editov').classList.add('show')}
function closeEdit(){document.getElementById('editov').classList.remove('show')}
function saveEdit(){const x=lib.find(l=>l.id===editId);x.tag=document.getElementById('etag').value;x.note=document.getElementById('enote').value;x.updated='今天';closeEdit();render();toast('已保存')}
/* toggle status */
function toggle(id){const x=lib.find(l=>l.id===id);x.status=x.status==='启用'?'停用':'启用';x.updated='今天';render();toast(x.status==='停用'?'已停用（不再进入监测与可选范围）':'已启用')}

renderRole();initTrackFilter();render();
</script>
</body>
</html>
