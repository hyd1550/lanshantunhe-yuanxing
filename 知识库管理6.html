function renderPage(){
  /* sidebar */

  const base=S.mineOnly?S.docs.filter(d=>d.mine):S.docs;

    const c=CC[t]||{dot:'#888'};

  }).join('');

  const sidebar=`<aside class="sb">

    ${typeNavs}
    <div class="sb-foot">
      <div class="sb-toggle${S.mineOnly?' on':''}" onclick="toggleMine()">${I.user} 只看我上传的<span class="switch${S.mineOnly?' on':''}"><span class="knob"></span></span></div>

    </div>
  </aside>`;

  /* main content 根据视图变化 */
  let mainContent='';
  const detailDoc=S.detailId?S.docs.find(d=>d.id===S.detailId):null;
  if(S.detailId&&!detailDoc) S.detailId=null;  /* 文档已不存在则回列表 */
  mainContent=detailDoc?buildDetailView(detailDoc):buildListView();

  const tnav=`<div class="tnav">
    <div class="logo"><div class="logo-box">${I.kb}</div><span class="logo-name">知识库</span></div>

  document.getElementById('page').innerHTML=`

/* 统一列表视图：检索框 + 当前筛选条 + 列表。类型（左侧导航）与来源（只看我上传的开关）可叠加 */
function buildListView(){
  let docs=S.docs;
  if(S.mineOnly) docs=docs.filter(d=>d.mine);
  if(S.ft!=='全部') docs=docs.filter(d=>d.type===S.ft);
  if(S.q) docs=docs.filter(d=>(d.title+d.author+d.type).includes(S.q));

  const searchBar=`<div class="search-bar">
    <div class="search-input-wrap">
      ${I.search}
      <input type="text" placeholder="搜索标题、作者、分类…" value="${S.q}" oninput="doSearch(this.value)">
      ${S.q?`<span style="font-size:11px;color:var(--color-text-tertiary);cursor:pointer;padding:2px 6px;border-radius:99px;background:var(--color-background-secondary)" onclick="clearQ()">清除</span>`:''}
    </div>
  </div>`;

  /* 当前生效的筛选以可移除标签呈现 */
  let chips='';
  if(S.mineOnly) chips+=`<span class="scope-chip">${I.user} 只看我上传的 <span class="chip-x" onclick="toggleMine()">${I.x}</span></span>`;
  if(S.ft!=='全部'){const c=CC[S.ft]||{dot:'#888'};chips+=`<span class="scope-chip"><span style="width:6px;height:6px;border-radius:50%;background:${c.dot};display:inline-block"></span>${S.ft} <span class="chip-x" onclick="setAllTypes()">${I.x}</span></span>`;}
  const scopeLabel=chips||`<span style="font-size:12px;color:var(--color-text-secondary);font-weight:500">全部文章</span>`;

  const strip=`<div class="tab-strip">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">${scopeLabel}</div>
    <span class="result-count">${docs.length} 篇${S.q?'（匹配"'+S.q+'"）':''}</span>
  </div>`;

  return searchBar+strip+`<div class="list-area">${buildListRows(docs)}</div>`;
}

function attKindInfo(a){
  if(a.kind==='pdf')   return {ic:'k-pdf',il:'PDF',bc:'b-pdf',bt:'PDF'};
  if(a.kind==='images')return {ic:'k-image',il:'IMG',bc:'b-img',bt:a.count+'张'};
  if(a.kind==='image') return {ic:'k-image',il:'IMG',bc:'b-img',bt:(a.ext||'IMG')};
  if(a.kind==='office'){const x=a.ext==='X';return {ic:x?'k-office-x':'k-office-w',il:x?'X':'W',bc:'b-conv',bt:'已转PDF'};}
  return {ic:'k-pdf',il:'FILE',bc:'b-pdf',bt:'文件'};
}

function buildAttPreview(a){

  }
  return buildPdfSheet(a);
}

function selectAtt(id){S.detailAtt=id;renderPage();}
function addAttach(){
  const inp=document.createElement('input');inp.type='file';inp.multiple=true;
  inp.onchange=()=>{const d=S.docs.find(x=>x.id===S.detailId);if(!d)return;if(!d.attachments)d.attachments=[];
    [...inp.files].forEach(f=>addFileToDoc(d,f));toast('已添加附件');renderPage();};
  inp.click();
}
function addFileToDoc(d,f){
  const ext=(f.name.split('.').pop()||'').toLowerCase();
  const rid='a'+Date.now()+Math.random().toString(36).slice(2,5);
  if(['png','jpg','jpeg','gif','webp','bmp'].includes(ext)){
    let g=d.attachments.find(a=>a.kind==='images');
    if(g){g.count++;g.size=g.count+' 张图片';}
    else d.attachments.push({id:rid,name:'图片附件',kind:'images',count:1,size:'1 张图片'});
    return;
  }
  if(['doc','docx','xls','xlsx','ppt','pptx'].includes(ext)){
    d.attachments.push({id:rid,name:f.name,kind:'office',ext:(ext[0]==='x'?'X':'W'),size:fmtSize(f.size),converted:true});return;
  }
  d.attachments.push({id:rid,name:f.name,kind:'pdf',size:fmtSize(f.size)});
}
function removeAtt(id,ev){
  if(ev)ev.stopPropagation();
  const d=S.docs.find(x=>x.id===S.detailId);if(!d||!d.attachments)return;
  d.attachments=d.attachments.filter(a=>a.id!==id);
  if(S.detailAtt===id) S.detailAtt=d.attachments.length?d.attachments[0].id:null;
  toast('附件已删除');renderPage();
}
function addFileToList(list,f){
  const ext=(f.name.split('.').pop()||'').toLowerCase();
  const rid='a'+Date.now()+Math.random().toString(36).slice(2,5);
  if(['png','jpg','jpeg','gif','webp','bmp'].includes(ext)){
    let g=list.find(a=>a.kind==='images');
    if(g){g.count++;g.size=g.count+' 张图片';}
    else list.push({id:rid,name:'图片附件',kind:'images',count:1,size:'1 张图片'});
    return;
  }
  if(['doc','docx','xls','xlsx','ppt','pptx'].includes(ext)){
    list.push({id:rid,name:f.name,kind:'office',ext:(ext[0]==='x'?'X':'W'),size:fmtSize(f.size),converted:true});return;
  }
  list.push({id:rid,name:f.name,kind:'pdf',size:fmtSize(f.size)});
}
function editAddFiles(kind){
  const inp=document.createElement('input');inp.type='file';inp.multiple=true;
  inp.accept=kind==='img'?'image/*':'.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx';
  inp.onchange=()=>{if(!S.ue)return;if(!S.ue.attachments)S.ue.attachments=[];[...inp.files].forEach(f=>addFileToList(S.ue.attachments,f));renderModal();};
  inp.click();
}
function editRemoveAtt(id){if(!S.ue||!S.ue.attachments)return;S.ue.attachments=S.ue.attachments.filter(a=>a.id!==id);renderModal();}

function buildListRows(docs){
  if(!docs.length) return `<div class="empty">暂无匹配的文档</div>`;
  return `<div class="list-hd">
      <span class="col-t">文档标题</span>
      <span class="col-y">类型</span>
      <span class="col-a">作者</span>
      <span class="col-d">日期</span>
      <span class="col-op">操作</span>
    </div>`+
  docs.map(doc=>{
    const c=CC[doc.type]||{dot:'#888',tag:'#eee',txt:'#444'};
    const isAdmin=S.role==='admin';
    const canManage=doc.mine||isAdmin;   /* 可见范围、下架：本人或管理员（管理员可治理任意文档）*/
    const canEdit=doc.mine;              /* 编辑内容：仅本人，管理员不替改他人内容 */
    let btns=`<button class="ia" onclick="openDetail(${doc.id})">${I.doc} 查看</button>`;
    if(canManage) btns+=`<button class="ia" onclick="openModal('settings',${doc.id})">${I.eye} 可见范围</button>`;
    if(canEdit)   btns+=`<button class="ia" onclick="openModal('edit',${doc.id})">${I.ed} 编辑</button>`;
    if(canManage) btns+=`<button class="ia rd" onclick="openModal('confirm',${doc.id})">${I.del} 下架</button>`;
    const actions=`<div class="act-row">${btns}</div>`;
    return `<div class="lrow${doc.mine?' mine':''}">
      <div class="col-t clk" onclick="openDetail(${doc.id})">
        <div class="doc-name">${doc.title}</div>
        <div class="doc-sub">${doc.desc}</div>
      </div>
      <div class="col-y"><span class="tag" style="background:${c.tag};color:${c.txt}"><span style="width:5px;height:5px;border-radius:50%;background:${c.dot};display:inline-block"></span>${doc.type}</span></div>
      <div class="col-a" style="font-size:12.5px;color:var(--color-text-secondary)">${doc.author}</div>
      <div class="col-d" style="font-size:12px;color:var(--color-text-tertiary)">${doc.date}</div>
      <div class="col-op">${actions}</div>
    </div>`;
  }).join('');
}

/* modals */
function renderModal(){
  const layer=document.getElementById('modal-layer');
  if(!S.modal){layer.innerHTML='';return}
  layer.innerHTML=`<div class="modal-overlay" id="ov">${buildModal()}</div>`;
  document.getElementById('ov').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
}

function mHead(icon,title){
  return `<div class="modal-hd">${icon}<h3>${title}</h3><button class="modal-close" onclick="closeModal()">${I.x}</button></div>`;
}
function buildModal(){
  if(S.modal==='upload')   return buildMUpload();
  if(S.modal==='settings') return buildMSettings();
  if(S.modal==='edit')     return buildMEdit();
  if(S.modal==='confirm')  return buildMConfirm();
  if(S.modal==='types')    return buildMTypes();
  return '';
}
function buildMUpload(){
  const f=S.uf;
  return `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-body">
      ${mHead(I.up,'上传知识材料')}
      <div class="fr"><label>标题 <span style="color:var(--color-text-danger)">*</span></label><input type="text" placeholder="请输入文档标题" value="${f.title}" oninput="S.uf.title=this.value"></div>
      <div class="fr"><label>摘要</label><textarea rows="2" placeholder="简要描述（选填）" oninput="S.uf.desc=this.value">${f.desc}</textarea></div>
      <div class="fr"><label>文档类型</label><select onchange="S.uf.type=this.value">${S.types.map(t=>`<option${f.type===t?' selected':''}>${t}</option>`).join('')}</select></div>
      <div class="fr"><label>可见范围</label><select onchange="S.uf.vis=this.value">
        <option value="public"${f.vis==='public'?' selected':''}>全集团可见</option>
        <option value="team"${f.vis==='team'?' selected':''}>本部门/公司可见</option>
        <option value="private"${f.vis==='private'?' selected':''}>仅自己可见</option>
      </select></div>
      <div class="fr"><label>上传文件 <span style="color:var(--color-text-danger)">*</span></label>
        <input type="file" id="upfile-doc" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx" style="display:none" onchange="onPickFile(this)">
        <input type="file" id="upfile-img" multiple accept="image/*" style="display:none" onchange="onPickFile(this)">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <button class="btn" style="flex-shrink:0" onclick="document.getElementById('upfile-doc').click()">${I.up} 上传文档</button>
          <button class="btn" style="flex-shrink:0" onclick="document.getElementById('upfile-img').click()">${I.up} 上传图片</button>
          <span id="upload-filename" style="font-size:12px;color:${(f.files&&f.files.length)?'var(--color-text-primary)':'var(--color-text-tertiary)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${(f.files&&f.files.length)?('已选 '+f.files.length+' 个文件'):'未选择文件'}</span>
        </div>
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:5px">文档：PDF / Word / Excel / PPT（自动转 PDF）；图片：多张自动合并为一组。可分别多次添加</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn dark" onclick="doUpload()">确认上传</button>
    </div></div>`;
}
function buildMSettings(){
  const doc=S.docs.find(d=>d.id===S.mid);if(!doc)return'';
  return `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-body">
      ${mHead(I.eye,'可见范围设置')}
      <div style="font-size:12.5px;color:var(--color-text-secondary);padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:13px">「${doc.title}」</div>
      <div class="fr"><label>可见范围</label><select id="vsel">
        <option value="public"${doc.vis==='public'?' selected':''}>全集团可见 — 集团所有人员可查看</option>
        <option value="team"${doc.vis==='team'?' selected':''}>本部门/公司可见 — 仅本部门或子公司成员</option>
        <option value="private"${doc.vis==='private'?' selected':''}>仅自己可见 — 完全私密</option>
      </select></div>
      <div class="hint-box">${I.lock} <span>${S.role==='admin'?'管理员可调整任意文档的可见范围':'仅可修改自己上传的文档可见范围'}</span></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn dark" onclick="saveSettings()">保存</button>
    </div></div>`;
}
function buildMEdit(){
  const doc=S.docs.find(d=>d.id===S.mid);if(!doc)return'';
  const u=S.ue||{};
  const rows=(u.attachments||[]).map(a=>{
    const k=attKindInfo(a);
    return `<div class="att-row" style="cursor:default">
      <div class="att-icon ${k.ic}">${k.il}</div>
      <div class="att-meta"><div class="att-name">${a.name}</div><div class="att-size">${a.size||''}</div></div>
      <span class="att-del" title="删除附件" onclick="editRemoveAtt('${a.id}')">${I.del}</span>
    </div>`;
  }).join('');
  return `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-body">
      ${mHead(I.ed,'编辑文档')}
      <div class="fr"><label>标题</label><input type="text" value="${u.title||''}" oninput="S.ue.title=this.value"></div>
      <div class="fr"><label>摘要</label><textarea rows="2" oninput="S.ue.desc=this.value">${u.desc||''}</textarea></div>
      <div class="fr"><label>文档类型</label><select onchange="S.ue.type=this.value">${S.types.map(t=>`<option${u.type===t?' selected':''}>${t}</option>`).join('')}</select></div>
      <div class="fr"><label>附件（${(u.attachments||[]).length}个）</label>
        <div style="display:flex;flex-direction:column;gap:2px;max-height:190px;overflow-y:auto">${rows||`<div style="font-size:12px;color:var(--color-text-tertiary);padding:6px 2px">暂无附件</div>`}</div>
        <div style="display:flex;gap:8px">
          <div class="att-upload" style="flex:1" onclick="editAddFiles('doc')">${I.up} 上传文档</div>
          <div class="att-upload" style="flex:1" onclick="editAddFiles('img')">${I.up} 上传图片</div>
        </div>
        <div class="att-upload-hint">文档：PDF / Word / Excel / PPT，Word、Excel 自动转 PDF；图片：多张自动合并为一组</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn dark" onclick="saveEdit()">确认保存</button>
    </div></div>`;
}
function buildMConfirm(){
  const doc=S.docs.find(d=>d.id===S.mid);
  return `<div class="modal" style="max-width:380px" onclick="event.stopPropagation()">
    <div class="modal-body">
      ${mHead(I.del,'下架确认')}
      <p style="font-size:13px;color:var(--color-text-secondary);line-height:1.7">确认下架「${doc?doc.title:''}」？<br>下架后文档将从知识库中移除，且无法恢复，请谨慎操作。</p>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn dang" onclick="doUnpublish()">确认下架</button>
    </div></div>`;
}
function buildMTypes(){
  return `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-body">
      ${mHead(I.cfg,'管理文档类型')}
      <div class="hint-box" style="margin-bottom:12px">${I.lock} <span>仅管理员可增删文档类型</span></div>
      ${S.types.map((t,i)=>{
        const c=CC[t]||{dot:'#888'};const cnt=S.docs.filter(d=>d.type===t).length;
        return `<div class="type-row">
          <span style="width:8px;height:8px;border-radius:50%;background:${c.dot};flex-shrink:0"></span>
          <span style="flex:1;font-size:12.5px;color:var(--color-text-primary)">${t}</span>
          <span style="font-size:11px;color:var(--color-text-tertiary);margin-right:8px">${cnt} 篇</span>
          <button class="ia rd" onclick="delType(${i})"${cnt>0?' disabled style="opacity:.35;cursor:default"':''}>${I.del}</button>
        </div>`;
      }).join('')}
      <div style="margin-top:13px;padding-top:13px;border-top:0.5px solid var(--color-border-tertiary)">
        <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px">添加新类型</div>
        <div style="display:flex;gap:8px">
          <input type="text" id="nt" placeholder="输入类型名称" style="flex:1;padding:7px 10px;font-size:12.5px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none">
          <button class="btn prim" onclick="addType()">${I.plus} 添加</button>
        </div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn dark" onclick="closeModal()">完成</button></div></div>`;
}

/* actions */
function setAllTypes(){S.ft='全部';S.q='';S.detailId=null;render()}          /* 全部类型：清除类型筛选 */
function clickType(t){S.ft=t;S.q='';S.detailId=null;render()}                /* 选择类型：在当前来源范围内下钻 */
function toggleMine(){S.mineOnly=!S.mineOnly;S.detailId=null;render()}       /* 只看我上传的：与类型叠加 */
function doSearch(v){S.q=v;
  const m=document.getElementById('main-area');
  if(m) m.innerHTML=buildListView();
}
function clearQ(){S.q='';render()}
function switchRole(){S.role=S.role==='admin'?'user':'admin';toast('已切换为'+(S.role==='admin'?'管理员':'普通用户'));render()}
function openModal(m,id){S.modal=m;S.mid=id||null;if(m==='upload')S.uf={title:'',desc:'',type:S.types[0],vis:'team',file:'',size:'',files:[]};if(m==='edit'){const _d=S.docs.find(x=>x.id===id);S.ue=_d?{title:_d.title,desc:_d.desc,type:_d.type,attachments:(_d.attachments||[]).map(a=>({...a}))}:null;}renderModal()}
function closeModal(){S.modal=null;S.mid=null;renderModal()}
function openDetail(id){S.detailId=id;S.detailAtt=null;S.modal=null;render()}
function closeDetail(){S.detailId=null;render()}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';return (b/1048576).toFixed(1)+' MB'}
function onPickFile(input){
  const fs=input.files;if(!fs||!fs.length)return;
  if(!S.uf.files)S.uf.files=[];
  S.uf.files=S.uf.files.concat([...fs].map(f=>({name:f.name,size:fmtSize(f.size)})));
  S.uf.file=S.uf.files[0].name;S.uf.size=S.uf.files[0].size;
  const span=document.getElementById('upload-filename');
  if(span){span.textContent='已选 '+S.uf.files.length+' 个文件';span.style.color='var(--color-text-primary)';}
  if(!S.uf.title.trim()){
    S.uf.title=S.uf.files[0].name.replace(/\.[^.]+$/,'');
    const ti=document.querySelector('.modal input[type=text]');
    if(ti)ti.value=S.uf.title;
  }
  input.value='';
}
function onPickEditFile(input){
  const f=input.files&&input.files[0];if(!f)return;
  S.ef.file=f.name;S.ef.size=fmtSize(f.size);
  const span=document.getElementById('edit-filename');
  if(span){span.textContent=f.name+'（'+S.ef.size+'）· 将替换';span.style.color='var(--text)';}
}
function doUpload(){
  if(!S.uf.files||!S.uf.files.length){toast('请选择要上传的文件');return}
  if(!S.uf.title.trim()){toast('请填写标题');return}
  const nd={id:Date.now(),title:S.uf.title,desc:S.uf.desc||'暂无摘要',type:S.uf.type,author:'我',mine:true,vis:S.uf.vis,status:'published',date:'今天',time:'刚刚',views:0,attachments:[]};
  S.uf.files.forEach(f=>{
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    const rid='n'+Math.random().toString(36).slice(2,7);
    if(['png','jpg','jpeg','gif','webp','bmp'].includes(ext)){
      let g=nd.attachments.find(a=>a.kind==='images');
      if(g){g.count++;g.size=g.count+' 张图片';}
      else nd.attachments.push({id:rid,name:'图片附件',kind:'images',count:1,size:'1 张图片'});
    } else if(['doc','docx','xls','xlsx','ppt','pptx'].includes(ext)){
      nd.attachments.push({id:rid,name:f.name,kind:'office',ext:(ext[0]==='x'?'X':'W'),size:f.size,converted:true});
    } else {
      nd.attachments.push({id:rid,name:f.name,kind:'pdf',size:f.size});
    }
  });
  S.docs.unshift(nd);
  S.modal=null;S.mineOnly=true;S.ft='全部';S.q='';S.detailId=null;toast('上传成功！');render();
}
function saveSettings(){
  const v=document.getElementById('vsel').value;
  const d=S.docs.find(d=>d.id===S.mid);
  if(d){d.vis=v;}
  closeModal();toast('可见范围已更新');renderPage();
}
function saveEdit(){
  const d=S.docs.find(d=>d.id===S.mid);
  if(d&&S.ue){
    d.title=S.ue.title;d.desc=S.ue.desc;d.type=S.ue.type;d.attachments=S.ue.attachments;
    if(S.detailAtt&&!(d.attachments||[]).some(a=>a.id===S.detailAtt)) S.detailAtt=(d.attachments&&d.attachments.length)?d.attachments[0].id:null;
  }
  S.ue=null;closeModal();toast('文档已保存');renderPage();
}
function doUnpublish(){
  if(S.detailId===S.mid) S.detailId=null;
  S.docs=S.docs.filter(d=>d.id!==S.mid);
  closeModal();toast('已下架，文档已从列表移除');renderPage();
}
function delType(i){
  const t=S.types[i];
  if(S.docs.some(d=>d.type===t)){toast('该类型下有文档，无法删除');return}
  S.types.splice(i,1);delete CC[t];
  if(S.ft===t)S.ft='全部';
  toast('类型已删除');renderModal();renderPage();
}
function addType(){
  const el=document.getElementById('nt');
  const v=(el?el.value:'').trim();
  if(!v){toast('请输入名称');return}
  if(S.types.includes(v)){toast('类型已存在');return}
  S.types.push(v);CC[v]={dot:'#888780',tag:'#F1EFE8',txt:'#5F5E5A'};
  toast('已添加：'+v);renderModal();renderPage();
}

render();
</script>
