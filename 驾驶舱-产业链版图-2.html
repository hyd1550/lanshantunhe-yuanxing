<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  background:
    radial-gradient(ellipse 1200px 700px at 50% 25%, rgba(23,151,184,.16) 0%, rgba(8,20,42,.0) 60%),
    linear-gradient(rgba(58,212,255,.05) 1px, transparent 1px) 0 0/60px 60px,
    linear-gradient(90deg, rgba(58,212,255,.05) 1px, transparent 1px) 0 0/60px 60px,
    #060c1a;
  color:#c8d6e5;height:100vh;overflow:hidden;display:flex;flex-direction:column;position:relative}
body::before{content:"";position:fixed;left:0;right:0;top:0;height:5px;z-index:1000;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,#1797b8 30%,#3ad4ff 50%,#1797b8 70%,transparent 100%);opacity:.6}
body::after{content:"";position:fixed;left:0;right:0;top:5px;height:24px;pointer-events:none;z-index:1000;
  background:
    linear-gradient(90deg,rgba(58,212,255,.45) 0,rgba(58,212,255,.45) 80px,transparent 80px) left top/100% 1px no-repeat,
    linear-gradient(-90deg,rgba(58,212,255,.45) 0,rgba(58,212,255,.45) 80px,transparent 80px) right top/100% 1px no-repeat}

/* ── header ── */
.hd{display:flex;align-items:center;justify-content:space-between;padding:16px 28px 12px;flex-shrink:0}
.hd-selector{display:flex;align-items:center;gap:12px}
.hd-label{font-size:14px;color:#94aabe;letter-spacing:.5px}
.chain-select{
  background:linear-gradient(180deg,#0d1a2e,#0a1525);
  border:1px solid rgba(120,160,200,.25);
  border-radius:6px;
  color:#e6eef8;
  padding:8px 38px 8px 16px;
  font-size:14px;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
  outline:none;
  appearance:none;
  -webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%2394aabe' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>");
  background-repeat:no-repeat;
  background-position:right 12px center;
  transition:border-color .15s,box-shadow .15s;
  min-width:240px;
}
.chain-select:hover{border-color:rgba(120,160,200,.5)}
.chain-select:focus{border-color:#2a9dac;box-shadow:0 0 0 2px rgba(42,157,172,.18)}
.chain-select option{background:#0d1a2e;color:#e6eef8;padding:8px}
/* 图谱区内浮动图例（3 色业务覆盖度） */
.legend{position:absolute;right:18px;bottom:18px;display:flex;flex-direction:column;gap:6px;
  background:rgba(14,24,42,.96);border:1px solid rgba(120,160,200,.3);border-radius:8px;
  padding:10px 14px;font-size:11.5px;color:#cfdff0;
  box-shadow:0 4px 14px rgba(0,0,0,.6);z-index:10;min-width:140px}
.legend::before{content:"业务覆盖度";display:block;font-weight:700;font-size:12px;color:#94aabe;
  border-bottom:1px solid rgba(120,160,200,.25);padding-bottom:4px;margin-bottom:2px;letter-spacing:.5px}
.lg{display:flex;align-items:center;gap:8px;font-size:11.5px;color:#cfdff0;line-height:1.35}
.lg-d{width:14px;height:9px;border-radius:2px;border:1px solid rgba(255,255,255,.15);flex-shrink:0}

/* view 切换 */
.view{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}
.placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#5a7a9a}
.placeholder-title{font-size:22px;font-weight:600;color:#94aabe;letter-spacing:1px}
.placeholder-sub{font-size:14px;color:#4a6680}

/* ── view2: 降解材料图谱（交互式深色主题，与第一个图谱一致） ── */
.graph2-wrap{flex:1;overflow:auto;background:linear-gradient(170deg,#0a1628 0%,#0c1a30 50%,#081420 100%);border-radius:0 0 14px 14px;position:relative}
.graph2-wrap::-webkit-scrollbar{width:10px;height:10px}
.graph2-wrap::-webkit-scrollbar-thumb{background:rgba(120,140,170,.35);border-radius:5px}
.graph2-wrap::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
.graph2{position:relative;width:3800px;height:11000px}
.graph2.graph3{width:4000px;height:2800px}
.graph2 svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
/* 屯河覆盖度视图：节点按"现有强链 / 上下游延链 / 短板补链 / 不涉及"着色（沿用原产业链图谱配色） */
#graph3.coverage-mode .nd2{background:#3a4555 !important;border-color:#5e6a7a !important;color:#cfe2f8 !important}
#graph3.coverage-mode .nd2.cov-strong{background:linear-gradient(180deg,#a04a18 0%,#bf5f22 100%) !important;border-color:#e68542 !important;color:#fff !important;box-shadow:0 0 8px rgba(190,95,30,.35) !important}
#graph3.coverage-mode .nd2.cov-extend{background:linear-gradient(180deg,#5d6a12 0%,#788620 100%) !important;border-color:#a8b832 !important;color:#fff !important;box-shadow:0 0 6px rgba(120,134,32,.3) !important}
#graph3.coverage-mode .nd2.cov-fill{background:linear-gradient(180deg,#0f5e6d 0%,#1a8090 100%) !important;border-color:#4ec0d2 !important;color:#fff !important;box-shadow:0 0 6px rgba(26,128,144,.3) !important}
#graph3.coverage-mode .nd2.cov-none{background:rgba(58,69,85,.55) !important;border-color:rgba(94,106,122,.5) !important;color:#94a4b8 !important;opacity:.7}

/* 视图模式切换按钮（左上角） */
.view-toolbar{position:absolute;left:18px;top:18px;display:flex;gap:0;z-index:30;
  background:rgba(8,22,40,.85);border:1px solid rgba(58,212,255,.3);border-radius:4px;overflow:hidden}
.view-toolbar .vt-btn{padding:7px 14px;font-size:12px;color:#a8c4e0;cursor:pointer;letter-spacing:.5px;
  border-right:1px solid rgba(58,212,255,.15);transition:.15s;user-select:none}
.view-toolbar .vt-btn:last-child{border-right:none}
.view-toolbar .vt-btn:hover{background:rgba(58,212,255,.12);color:#fff}
.view-toolbar .vt-btn.active{background:linear-gradient(180deg,#1797b8,#0a6584);color:#fff;font-weight:600}

/* 覆盖度图例（在覆盖度视图下显示） */
.legend-cov{position:absolute;right:18px;bottom:18px;background:rgba(14,24,42,.96);
  border:1px solid rgba(120,160,200,.3);border-radius:8px;padding:10px 12px;font-size:11px;color:#cfdff0;
  box-shadow:0 4px 14px rgba(0,0,0,.6);z-index:10;min-width:140px;display:none}
.legend-cov-title{font-weight:700;font-size:12px;margin-bottom:6px;color:#94aabe;
  border-bottom:1px solid rgba(120,160,200,.25);padding-bottom:4px}
.legend-cov-row{display:flex;align-items:center;gap:8px;padding:3px 0;line-height:1.4}
.legend-cov-sw{width:14px;height:9px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
#view-daily.cov-active .legend-cov{display:block}
#view-daily.cov-active .legend2{display:none}

/* 总图谱 + 日用消费品：滚轮缩放 + 鼠标拖拽平移，整图初始居中 */
#graph2-wrap,#graph3-wrap{display:block !important;overflow:hidden !important;position:relative;cursor:grab;user-select:none}
#graph2-wrap.dragging,#graph3-wrap.dragging{cursor:grabbing}
#graph2-wrap.dragging *,#graph3-wrap.dragging *{cursor:grabbing !important}
#graph2,#graph3{position:absolute;left:0;top:0;transform-origin:0 0}

/* 视图 4：图片预览（拖拽 + 缩放） */
.img-wrap{flex:1;overflow:hidden;background:linear-gradient(170deg,#0a1628,#0c1a30 50%,#081420);
  border-radius:0 0 14px 14px;position:relative;display:flex;align-items:center;justify-content:center;
  cursor:grab;user-select:none}
.img-wrap.dragging{cursor:grabbing}
.img-wrap.dragging *{cursor:grabbing !important}
.img-wrap img{position:absolute;left:0;top:0;transform-origin:0 0;max-width:none;display:block;
  box-shadow:0 4px 24px rgba(0,0,0,.5);border-radius:4px;pointer-events:none}
.img-title{position:absolute;left:18px;top:14px;font-size:14px;color:#cfe2f8;letter-spacing:1.5px;
  background:rgba(8,22,40,.85);border:1px solid rgba(58,212,255,.3);border-radius:4px;
  padding:6px 14px;z-index:10;font-weight:600}
/* 缩放控件：右下角悬浮按钮 */
.zoom-ctrl{position:absolute;right:18px;bottom:18px;display:flex;flex-direction:column;gap:4px;z-index:30}
.zoom-ctrl .zb{width:32px;height:32px;background:rgba(15,40,65,.85);border:1px solid rgba(58,212,255,.35);
  color:#cfe2f8;font-size:18px;font-weight:600;line-height:1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:3px;transition:.15s;user-select:none}
.zoom-ctrl .zb:hover{background:rgba(58,212,255,.18);border-color:#3ad4ff;color:#fff}
.zoom-ctrl .zb-lbl{font-size:10.5px;height:auto;padding:3px 6px;line-height:1.2;background:rgba(8,22,40,.7);
  border:1px solid rgba(60,160,200,.2);color:#a8c4e0;border-radius:3px;text-align:center;font-weight:400}

/* 节点（深色背景上的彩色块） */
.nd2{position:absolute;z-index:3;border-radius:4px;padding:4px 8px;font-size:10.5px;font-weight:500;white-space:nowrap;line-height:1.2;display:flex;align-items:center;justify-content:center;text-align:center;border:1px solid rgba(255,255,255,.12);box-shadow:0 1px 3px rgba(0,0,0,.4);cursor:default}
.nd2.vert{writing-mode:vertical-rl;text-orientation:upright;letter-spacing:2px;padding:8px 4px}
.nd2.dashed{border-style:dashed;border-width:1.4px}
.nd2-gray{background:linear-gradient(180deg,#4a5664,#5e6a78);color:#fff;font-weight:600;font-size:12.5px;border-color:#7a8898}
.nd2-blue{background:linear-gradient(180deg,#2960a8,#3a7ac4);color:#fff;font-weight:600;border-color:#5fa0e0}
.nd2-orange{background:linear-gradient(180deg,#b85a18,#d2722a);color:#fff;font-weight:600;border-color:#e89042}
.nd2-yellow{background:linear-gradient(180deg,#8a6c12,#a8841a);color:#fffce0;border-color:#d4a830}
.nd2-green{background:linear-gradient(180deg,#3a6818,#4d8424);color:#f0ffe0;border-color:#7ab040}
.nd2-purple{background:linear-gradient(180deg,#4a3a8a,#5e4ca8);color:#fff;border-color:#8a7ad4}

/* 边标签（设备/试剂） */
.eg-lbl{position:absolute;z-index:2;font-size:9px;color:#7c92a8;line-height:1.25;text-align:center;pointer-events:none;max-width:140px;white-space:normal}
.eg-lbl .eq{color:#94aabe}
.eg-lbl .rg{color:#7088a0;font-style:italic}

/* 图例（右下角浮动，深色卡片） */
.legend2{position:absolute;right:18px;bottom:18px;background:rgba(14,24,42,.96);border:1px solid rgba(120,160,200,.3);border-radius:8px;padding:10px 12px;font-size:11px;color:#cfdff0;box-shadow:0 4px 14px rgba(0,0,0,.6);z-index:10;min-width:170px}
.legend2-title{font-weight:700;font-size:12px;margin-bottom:6px;color:#94aabe;border-bottom:1px solid rgba(120,160,200,.25);padding-bottom:4px}
.legend2-row{display:flex;align-items:center;gap:8px;padding:2px 0;line-height:1.4}
.lgd{width:18px;height:11px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
.lgd-gray{background:#5e6a78}
.lgd-blue{background:#3a7ac4}
.lgd-orange{background:#d2722a}
.lgd-yellow{background:#a8841a}
.lgd-green{background:#4d8424}
.lgd-purple{background:#5e4ca8}
.lgd-line{width:18px;height:2px;background:#e0463a;flex-shrink:0}
.legend2-note{font-size:10px;color:#7a90a8;margin-top:4px;border-top:1px dashed rgba(120,140,170,.25);padding-top:4px}

/* ── main panel ── */
.panel{flex:1;margin:0 22px 16px;background:linear-gradient(170deg,#0a1628 0%,#0c1a30 50%,#081420 100%);border:1px solid rgba(58,212,255,.22);border-radius:2px;position:relative;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 0 22px rgba(20,60,120,.18) inset, 0 0 8px rgba(58,212,255,.06)}
/* 四角直角光框 */
.panel::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:20;
  background:
    linear-gradient(#3ad4ff,#3ad4ff) top    left  /18px 2px no-repeat,
    linear-gradient(#3ad4ff,#3ad4ff) top    left  /2px 18px no-repeat,
    linear-gradient(#3ad4ff,#3ad4ff) top    right /18px 2px no-repeat,
    linear-gradient(#3ad4ff,#3ad4ff) top    right /2px 18px no-repeat,
    linear-gradient(#3ad4ff,#3ad4ff) bottom left  /18px 2px no-repeat,
    linear-gradient(#3ad4ff,#3ad4ff) bottom left  /2px 18px no-repeat,
    linear-gradient(#3ad4ff,#3ad4ff) bottom right /18px 2px no-repeat,
    linear-gradient(#3ad4ff,#3ad4ff) bottom right /2px 18px no-repeat;
  filter:drop-shadow(0 0 4px rgba(58,212,255,.6))}

.graph-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.graph{position:relative;width:1200px;height:660px;flex-shrink:0}
.graph svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* column labels */
.col-labels{height:40px;display:flex;flex-shrink:0;background:rgba(255,255,255,.012);border-top:1px solid rgba(255,255,255,.04)}
.cl{flex:none;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#3e5878;letter-spacing:3px}

/* ── nodes ── */
.nd{position:absolute;z-index:3;border-radius:5px;padding:6px 12px;font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .15s;line-height:1.2;display:flex;align-items:center;justify-content:center;text-align:center}
.nd:hover{transform:translateY(-1px);z-index:10;filter:brightness(1.15)}

/* 无填充 - 环节节点 */
.nd-out{background:rgba(18,28,46,.55);border:1.4px solid #a8bbcc;color:#dee8f2;font-weight:500;padding:5px 11px}

/* 现有产业强链 - 橙色 */
.nd-strong{background:linear-gradient(180deg,#a04a18 0%,#bf5f22 100%);border:1.4px solid #e68542;color:#ffffff;box-shadow:0 1px 6px rgba(190,95,30,.3)}

/* 上下游延链 - 橄榄绿 */
.nd-extend{background:linear-gradient(180deg,#5d6a12 0%,#788620 100%);border:1.4px solid #a8b832;color:#ffffff;box-shadow:0 1px 6px rgba(120,134,32,.25)}

/* 短板环节补链 - 青色 */
.nd-fill{background:linear-gradient(180deg,#0f5e6d 0%,#1a8090 100%);border:1.4px solid #4ec0d2;color:#ffffff;box-shadow:0 1px 6px rgba(26,128,144,.25)}

/* 应用区域 */
.app-area{position:absolute;border:1.5px dashed rgba(255,255,255,.13);border-radius:12px;display:flex;flex-direction:column;justify-content:space-around;padding:24px 18px;z-index:2;left:1058px;top:22px;bottom:22px;right:8px}
.app-i{font-size:14px;color:#a8c0d8;display:flex;align-items:center;gap:10px;letter-spacing:.5px}
.app-i .dot{width:5px;height:5px;border-radius:50%;background:#7290ac;flex-shrink:0}

/* tooltip */
.tt{position:fixed;z-index:999;background:#101e35;border:1px solid rgba(80,140,200,.22);border-radius:8px;padding:12px 14px;font-size:12px;color:#d0e0f0;max-width:280px;pointer-events:none;display:none;line-height:1.6;box-shadow:0 8px 28px rgba(0,0,0,.5)}

/* nd2 节点改为可点击 */
.nd2{cursor:pointer !important;transition:transform .15s,filter .15s,box-shadow .15s}
.nd2:hover{transform:translateY(-1px);filter:brightness(1.2);box-shadow:0 2px 8px rgba(58,212,255,.5);z-index:10}

/* ── 企业列表/详情 弹窗 ── */
.s-modal{position:fixed;inset:0;background:rgba(2,8,20,.7);backdrop-filter:blur(2px);z-index:9999;
  opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:center;justify-content:center}
.s-modal.show{opacity:1;pointer-events:auto}
.s-modal-pnl{width:1080px;max-width:96%;height:720px;max-height:92%;
  background:linear-gradient(180deg,#0a1c38 0%,#061226 100%);border:1px solid rgba(58,212,255,.4);border-radius:6px;
  display:flex;flex-direction:column;position:relative;overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.6),0 0 30px rgba(58,212,255,.12)}
.s-modal-pnl::before{content:"";position:absolute;left:0;top:0;width:100%;height:3px;
  background:linear-gradient(90deg,transparent,#3ad4ff,transparent)}
.s-modal-hd{padding:18px 52px 14px 24px;border-bottom:1px solid rgba(80,180,210,.18);flex-shrink:0;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.s-modal-hd .h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:1px;margin-right:auto}
.s-modal-hd .tag{display:inline-block;font-size:11.5px;padding:3px 10px;border-radius:2px;letter-spacing:.5px;font-weight:500;
  border:1px solid rgba(58,212,255,.4);background:rgba(58,212,255,.12);color:#7fc4ff}
.s-modal-close{position:absolute;right:14px;top:14px;width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(80,180,210,.3);color:#a8c4e0;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;z-index:5}
.s-modal-close:hover{background:rgba(255,80,120,.2);color:#fff;border-color:#ff6b8a}
.s-modal-body{flex:1;overflow:auto;padding:14px 24px 20px;min-height:0}
.s-search{display:flex;align-items:center;gap:8px;padding:6px 0 12px;flex-shrink:0;flex-wrap:wrap}
.s-search input{flex:1;max-width:320px;background:rgba(15,35,65,.6);border:1px solid rgba(60,160,200,.25);
  border-radius:3px;padding:6px 10px;font-size:12.5px;color:#cfe2f8;outline:none}
.s-search input:focus{border-color:#3ad4ff;box-shadow:0 0 0 2px rgba(58,212,255,.15)}
.s-search button{background:linear-gradient(180deg,#1797b8,#0a6584);border:none;color:#fff;padding:6px 22px;border-radius:3px;cursor:pointer;font-size:12.5px;letter-spacing:1px}
table.s-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;color:#bcd0e8;table-layout:fixed}
table.s-tbl th{position:sticky;top:0;background:linear-gradient(180deg,#0e2a52,#091833);
  color:#a8c4e0;font-weight:500;letter-spacing:.5px;font-size:12px;
  padding:10px 14px;text-align:left;border-bottom:2px solid rgba(58,212,255,.4);white-space:nowrap;z-index:2}
table.s-tbl td{padding:11px 14px;border-bottom:1px solid rgba(60,160,200,.08);vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
table.s-tbl tbody tr:nth-child(even){background:rgba(15,55,75,.16)}
table.s-tbl tbody tr:hover{background:rgba(30,110,140,.22);box-shadow:inset 3px 0 0 #3ad4ff}
.s-tbl-name{color:#dbeaff;font-weight:600;font-size:13px;line-height:1.4;cursor:pointer;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;word-break:break-word}
.s-tbl-name:hover{color:#3ad4ff;text-decoration:underline}
.s-tbl-no{font-family:'DIN','Consolas',monospace;color:#a8c4e0;font-size:11.5px;letter-spacing:.3px;
  padding:2px 8px;background:rgba(60,160,200,.08);border:1px solid rgba(60,160,200,.18);border-radius:3px;display:inline-block}
.s-detail-btn{font-size:11.5px;color:#3ad4ff;cursor:pointer;padding:3px 11px;
  border:1px solid rgba(58,212,255,.35);background:rgba(58,212,255,.1);border-radius:3px;letter-spacing:.5px;
  transition:.15s;display:inline-block}
.s-detail-btn:hover{background:#1797b8;color:#fff;border-color:#1797b8}
.s-detail-grid{display:grid;grid-template-columns:140px 1fr 140px 1fr;gap:0;
  border:1px solid rgba(60,160,200,.18);border-radius:4px;overflow:hidden;margin-bottom:18px}
.s-detail-grid > div{padding:11px 14px;border-bottom:1px solid rgba(60,160,200,.08);font-size:12.5px;line-height:1.55}
.s-detail-grid > div:nth-child(4n+1),.s-detail-grid > div:nth-child(4n+3){
  background:rgba(15,55,75,.4);color:#a8c4e0;font-weight:500;letter-spacing:.5px;border-right:1px solid rgba(60,160,200,.08)}
.s-detail-grid > div:nth-child(4n+2),.s-detail-grid > div:nth-child(4n){color:#dbeaff}
.s-detail-grid > div:nth-child(4n+2){border-right:1px solid rgba(60,160,200,.08)}
.s-detail-grid > div:nth-last-child(-n+4){border-bottom:none}
.s-detail-grid .full{grid-column:1/-1}
.s-detail-grid > div.full{background:rgba(8,22,45,.5);color:#dbeaff;font-weight:400}
.s-detail-sect-h{font-size:14px;color:#dbeaff;font-weight:600;letter-spacing:1px;padding-left:10px;
  border-left:3px solid #3ad4ff;margin-bottom:10px;margin-top:4px}

<script>
function openChainModal(id){document.getElementById(id).classList.add('show')}
function closeChainModal(id){document.getElementById(id).classList.remove('show')}
document.querySelectorAll('.s-modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeChainModal(m.id)}));

// ══════════════ 节点 → 在产企业 mock 生成 ══════════════
const COMP_PREFIXES = ['新疆','山东','江苏','浙江','广东','上海','北京','安徽','河南','湖北','福建','四川','辽宁','天津','河北','陕西','内蒙古','宁夏','甘肃'];
const COMP_SUFFIXES = ['化工股份有限公司','新材料股份有限公司','降解科技有限公司','聚酯科技有限公司','可降解材料有限公司','环保新材有限公司','生物材料股份有限公司','石化集团','化纤股份有限公司','新材集团'];
const COMP_BRAND = ['蓝山屯河','金发','万华','中科金龙','丰原','蓝晶微生物','三菱','NatureWorks','Perstorp','华峰','沙隆达','吉化','天辰','广州盛和','安徽劲旋风','南京聚鑫','嘉化','龙佰','建滔','中石化'];
const CITIES = {'新疆':['昌吉','乌鲁木齐','石河子'],'山东':['济南','青岛','烟台','潍坊','淄博'],'江苏':['南京','苏州','无锡','常州','南通'],'浙江':['杭州','宁波','嘉兴','台州'],'广东':['广州','深圳','东莞','佛山'],'上海':['浦东','金山','宝山'],'北京':['海淀','朝阳','顺义'],'安徽':['合肥','蚌埠','芜湖'],'河南':['郑州','洛阳','开封'],'湖北':['武汉','宜昌','襄阳'],'福建':['厦门','福州','泉州'],'四川':['成都','德阳','宜宾'],'辽宁':['沈阳','大连','营口'],'天津':['滨海','武清'],'河北':['石家庄','沧州','邯郸'],'陕西':['西安','榆林','咸阳'],'内蒙古':['呼和浩特','包头','鄂尔多斯'],'宁夏':['银川','石嘴山'],'甘肃':['兰州','酒泉']};
const STREETS = ['工业园区','经济开发区','化工园区','高新技术开发区','产业基地','科技园'];
const CAP_OPTS = [3000,5000,8000,10000,12000,15000,20000,30000,50000,80000,100000];
const STATUS_OPTS = [{l:'存续（在营、开业、在册）',c:'#42d29a'},{l:'存续（在营、开业、在册）',c:'#42d29a'},{l:'存续（在营、开业、在册）',c:'#42d29a'},{l:'迁出',c:'#fcd34d'}];
const TYPES = ['有限责任公司','股份有限公司','有限责任公司（中外合资）','有限责任公司（自然人投资或控股）'];
const INDUSTRIES = ['化学原料和化学制品制造业','橡胶和塑料制品业','合成材料制造','生物降解新材料制造','研究和试验发展'];
const EMPS = ['10-50 人','50-200 人','200-500 人','500-1000 人','1000 人以上'];
const LEGAL_PERSONS = ['张明华','李伟强','王建国','刘志刚','陈彦军','赵宏伟','黄少华','周泽昊','吴俊杰','徐海峰'];

function rnd(seed,k){let h=2166136261;for(let i=0;i<seed.length;i++){h^=seed.charCodeAt(i);h=Math.imul(h,16777619)}h=Math.imul(h^k,2654435761);return ((h>>>0)/4294967295)}

function genCompForNode(nodeId, nodeName){
  const seed = nodeId + '|' + nodeName;
  const baseCount = 8 + Math.floor(rnd(seed,1)*15);  // 8 ~ 22
  const list = [];
  for (let i=0; i<baseCount; i++){
    const provIdx = Math.floor(rnd(seed,i*7+2)*COMP_PREFIXES.length);
    const prov = COMP_PREFIXES[provIdx];
    const cities = CITIES[prov]||[prov];
    const city = cities[Math.floor(rnd(seed,i*7+3)*cities.length)];
    const brand = COMP_BRAND[Math.floor(rnd(seed,i*7+4)*COMP_BRAND.length)];
    const suf = COMP_SUFFIXES[i%COMP_SUFFIXES.length];
    const compName = brand + suf;
    const cap = CAP_OPTS[Math.floor(rnd(seed,i*7+5)*CAP_OPTS.length)];
    const founded = (1995 + Math.floor(rnd(seed,i*7+6)*28)) + '-' + String(Math.floor(rnd(seed,i*7+7)*12)+1).padStart(2,'0') + '-' + String(Math.floor(rnd(seed,i*7+8)*28)+1).padStart(2,'0');
    const tax = '91' + (Math.floor(rnd(seed,i*7+9)*9999999999999999)).toString().slice(0,15);
    const street = STREETS[Math.floor(rnd(seed,i*7+10)*STREETS.length)];
    const no = Math.floor(rnd(seed,i*7+11)*888)+1;
    const address = prov + (prov.length<=2?'省':'') + city + '市' + street + no + '号';
    const legalPerson = LEGAL_PERSONS[Math.floor(rnd(seed,i*7+12)*LEGAL_PERSONS.length)];
    const compType = TYPES[Math.floor(rnd(seed,i*7+13)*TYPES.length)];
    const industry = INDUSTRIES[Math.floor(rnd(seed,i*7+14)*INDUSTRIES.length)];
    const emp = EMPS[Math.floor(rnd(seed,i*7+15)*EMPS.length)];
    const status = STATUS_OPTS[Math.floor(rnd(seed,i*7+16)*STATUS_OPTS.length)];
    const phone = '0' + (Math.floor(rnd(seed,i*7+17)*900)+100) + '-' + (Math.floor(rnd(seed,i*7+18)*90000000)+10000000);
    const email = 'contact'+Math.floor(rnd(seed,i*7+19)*999)+'@'+brand.toLowerCase().replace(/[^a-z0-9]/g,'')+'.com.cn';
    const website = 'www.'+brand.toLowerCase().replace(/[^a-z0-9]/g,'')+'.com.cn';
    const products = nodeName + (i%3===0 ? '、' + (nodeName==='PBAT'?'PLA':nodeName==='PLA'?'PBAT':'其他可降解材料') : '');
    list.push({
      name: compName, prov, city, address, cap, founded, tax, legalPerson, compType, industry, emp, status,
      phone, email, website, products, scope: '生物降解新材料的研发、生产与销售；'+products+'等高分子材料及其制品的制造、加工；化工产品技术开发、技术咨询、技术转让；货物及技术进出口业务（不含国家禁止或限制的项目）。'
    });
  }
  list.sort((a,b)=>b.cap-a.cap);
  return list;
}

// 接收 iframe 图谱（母婴/日用消费品）通过 postMessage 发来的节点点击
window.addEventListener('message', function(ev){
  const d = ev.data;
  if (!d) return;
  if (d.type === 'chain-comp-list' && d.nodeId) {
    // 日用消费品产业链 PBAT 节点 → 走"产能/产量"下钻示意原型（演示用）
    if (d.nodeId === 'pbat') { __lastCompContext = {fromChain:'daily', fromLabel:'日用消费品产业链'}; openPbatDemo(); return; }
    __lastCompContext = {fromChain: (d.fromChain||'daily'), fromLabel: (d.fromLabel||'日用消费品产业链')};
    openChainCompList(d.nodeId, d.nodeName);
    return;
  }
  // 基料节点 ↗：跳转降解材料产业链定位上游原料路径
  if (d.type === 'locate-in-bio' && d.keyword) {
    locateInBio(d.keyword, d.fromChain || 'daily', d.fromLabel || '日用消费品产业链');
  }
});

/* ════════════════════════════════════════════════
   反向溯源：业务链(日用/母婴)基料节点 → 降解材料产业链定位上游原料路径
════════════════════════════════════════════════ */
const BIO_POLYMERS = ['PBS','PBAT','PLA','PHA'];
let __bioLocateFrom = null;          // {val, label, keyword}
let __lastCompContext = null;        // 记录上一个企业列表/弹窗来源链，用于注入跳转按钮

function locateInBio(keyword, fromChain, fromLabel){
  const sourceVal = fromChain === 'mb' ? 'img:mb' : 'daily';
  __bioLocateFrom = { val: sourceVal, label: fromLabel, keyword };
  document.querySelectorAll('.s-modal.show').forEach(m=>m.classList.remove('show'));
  const sel = document.getElementById('chain-select');
  sel.value = 'degradable';
  sel.dispatchEvent(new Event('change'));
  const fr = document.getElementById('bioFrame');
  const sendLocate = ()=>{ try { fr.contentWindow.postMessage({type:'locate', keyword}, '*'); } catch(e){} };
  setTimeout(sendLocate, 250);
  setTimeout(sendLocate, 800);
  fr.addEventListener('load', sendLocate, { once:true });
  showBioBackBanner();
}

function showBioBackBanner(){
  const info = __bioLocateFrom;
  if (!info) return;
  const host = document.getElementById('view-degradable');
  if (!host) return;
  let bn = document.getElementById('bioBackBanner');
  if (!bn) {
    bn = document.createElement('div');
    bn.id = 'bioBackBanner';
    bn.style.cssText = 'position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:50;'
      +'background:linear-gradient(180deg,rgba(255,180,60,.18),rgba(255,140,30,.12));'
      +'border:1px solid rgba(255,200,80,.55);border-radius:4px;padding:8px 16px;font-size:12.5px;color:#ffd47a;'
      +'letter-spacing:.5px;line-height:1.4;box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 12px rgba(255,200,80,.15);'
      +'display:flex;align-items:center;gap:10px;font-family:\'PingFang SC\',\'Microsoft YaHei\';transition:opacity .6s';
    host.appendChild(bn);
  }
  bn.innerHTML = '<span style="font-size:14px">↩</span>'
    +'<span>已从「<b style="color:#ffe39a">'+info.label+'</b>」跳转 · 定位至 <b style="color:#ffe39a">'+info.keyword+'</b> 上游原料路径</span>'

// 简易柱状图（横向）
function pbatBarChart(items){
  const W = 460, H = 200, padL=160, padR=44, padT=10, padB=14;
  const max = Math.max(...items.map(d=>d.v));
  const rowH = (H - padT - padB) / items.length;
  const bw = W - padL - padR;
  let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  // 网格线
  for (let i=0;i<=4;i++){
    const x = padL + bw*i/4;
    svg += `<line x1="${x}" y1="${padT}" x2="${x}" y2="${H-padB}" stroke="rgba(120,160,200,.12)" stroke-width="1"/>`;
  }
  items.forEach((d,i)=>{
    const y = padT + rowH*i + 4;
    const h = Math.max(8, rowH - 8);
    const w = bw * (d.v/max);
    // 名称
    const nm = d.name.length > 14 ? d.name.slice(0,13)+'…' : d.name;
    svg += `<text x="${padL-8}" y="${y+h/2+3}" font-size="10.5" fill="#a8c4e0" text-anchor="end" font-family="PingFang SC, Microsoft YaHei">${nm}</text>`;
    // 柱（渐变）
    svg += `<rect x="${padL}" y="${y}" width="${w}" height="${h}" fill="url(#pbBarGrad)" rx="1.5"/>`;
    // 值
    svg += `<text x="${padL+w+5}" y="${y+h/2+3}" font-size="10.5" fill="#3ad4ff" font-family="DIN, Arial" font-weight="700">${d.v.toFixed(1)}</text>`;
  });
  svg += `<defs><linearGradient id="pbBarGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1797b8"/><stop offset="1" stop-color="#3ad4ff"/></linearGradient></defs>`;
  svg += `</svg>`;
  return svg;
}

// 简易折线图（带面积）
function pbatLineChart(labels, vals, unit){
  const W = 520, H = 200, padL=42, padR=14, padT=14, padB=28;
  const min = Math.min(...vals), max = Math.max(...vals);
  const lo = Math.floor(min*0.85), hi = Math.ceil(max*1.05);
  const xw = W - padL - padR, yh = H - padT - padB;
  const xs = vals.map((_,i)=>padL + xw*i/(vals.length-1));
  const ys = vals.map(v=>padT + yh*(1-(v-lo)/(hi-lo)));
  let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  // y 轴网格 + 标签
  for (let i=0;i<=4;i++){
    const y = padT + yh*i/4;
    const val = (hi - (hi-lo)*i/4).toFixed(1);
    svg += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="rgba(120,160,200,.1)" stroke-width="1"/>`;
    svg += `<text x="${padL-6}" y="${y+3}" font-size="9.5" fill="#7fa3c8" text-anchor="end" font-family="DIN, Arial">${val}</text>`;
  }
  // 面积
  let area = `M${xs[0]},${H-padB} L`+xs.map((x,i)=>`${x},${ys[i]}`).join(' L')+` L${xs[xs.length-1]},${H-padB} Z`;
  svg += `<path d="${area}" fill="url(#pbLineArea)" opacity=".55"/>`;
  // 折线
  let line = `M`+xs.map((x,i)=>`${x},${ys[i]}`).join(' L');
  svg += `<path d="${line}" fill="none" stroke="#3ad4ff" stroke-width="1.8" stroke-linejoin="round"/>`;
  // 点 + 值
  xs.forEach((x,i)=>{
    svg += `<circle cx="${x}" cy="${ys[i]}" r="3" fill="#0a1c38" stroke="#3ad4ff" stroke-width="1.6"/>`;
  });
  // x 轴标签（每隔 1 个）
  labels.forEach((l,i)=>{
    if (i%2!==0 && i!==labels.length-1) return;
    const lab = l.slice(5); // MM
    svg += `<text x="${xs[i]}" y="${H-padB+12}" font-size="10" fill="#a8c4e0" text-anchor="middle" font-family="DIN, Arial">${lab}</text>`;
  });
  // 单位
  svg += `<text x="${W-padR}" y="${padT-4}" font-size="9.5" fill="#7fa3c8" text-anchor="end" font-family="PingFang SC">单位：${unit}</text>`;
  svg += `<defs><linearGradient id="pbLineArea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3ad4ff" stop-opacity=".55"/><stop offset="1" stop-color="#3ad4ff" stop-opacity="0"/></linearGradient></defs>`;
  svg += `</svg>`;
  return svg;
}

function openPbatCompDetail(idx){
  const c = PBAT_COMPS[idx];
  if (!c) return;
  // 单企业 — 按 ratio 分配产能/产量，叠加 ±10% 抖动
  const seed = c.name;
  function jit(k){ let h=2166136261; for(let i=0;i<seed.length;i++){h^=seed.charCodeAt(i);h=Math.imul(h,16777619)} h=Math.imul(h^k,2654435761); return ((h>>>0)/4294967295); }
  const prods = PBAT_PROD_TPL.map((p,i)=>{
    const jR = 0.90 + jit(i*3+1)*0.20;
    const cap = +(c.cap * p.ratio * jR).toFixed(2);
    const utl = +(c.util + (jit(i*3+2)-0.5)*8).toFixed(1);
    const prod = +(cap * utl/100).toFixed(2);
    return { name:p.name, app:p.app, cap, prod, utl };
  });
  // 5 个产品的合计应与企业总值接近，做一次比例归一
  const sumCap = prods.reduce((s,p)=>s+p.cap,0);
  const sumProd = prods.reduce((s,p)=>s+p.prod,0);
  const kC = c.cap/sumCap, kP = c.prod/sumProd;
  prods.forEach(p=>{ p.cap = +(p.cap*kC).toFixed(2); p.prod = +(p.prod*kP).toFixed(2); p.utl = +(p.prod/p.cap*100).toFixed(1); });

  // 月度产量趋势：企业占节点的比例 × 节点月度 ± 抖动
  const ratio = c.prod / PBAT_COMPS.reduce((s,x)=>s+x.prod,0);
  const monProd = PBAT_MON_PROD.map((v,i)=>+(v*ratio*(0.85+jit(i*5+9)*0.30)).toFixed(2));
  const line = pbatLineChart(PBAT_MONTHS, monProd, '万吨');

  // 产品柱图
  const bar = pbatBarChart(prods.map(p=>({name:p.name.replace('PBAT ','').slice(0,12), v:p.cap})));

  // 产品明细行
  const prodRows = prods.map((p,i)=>(
    '<tr>'+
      '<td style="text-align:center;color:#7fa3c8;font-family:DIN,Arial">P-'+String(i+1).padStart(2,'0')+'</td>'+
      '<td style="color:#dbeaff;font-weight:600">'+p.name+'</td>'+
      '<td style="color:#a8c4e0;font-size:11.5px">'+p.app+'</td>'+
      '<td class="num">'+p.cap.toFixed(2)+' <span class="u">万吨/年</span></td>'+
      '<td class="num">'+p.prod.toFixed(2)+' <span class="u">万吨</span></td>'+
      '<td><span class="pct-bar"><span style="width:'+Math.min(100,p.utl)+'%"></span></span><span style="color:#3ad4ff;font-family:DIN,Arial;font-weight:700">'+p.utl.toFixed(1)+'%</span></td>'+
    '</tr>'
  )).join('');

  document.getElementById('pbatCompTitle').textContent = '企业详情 — ' + c.name;
  document.getElementById('pbatCompBody').innerHTML =
    '<div class="s-detail-sect-h">基本信息（工商登记）</div>'+
    '<div class="s-detail-grid">'+
      '<div>企业名称</div><div style="color:#fff;font-weight:600">'+c.name+'</div>'+
      '<div>所属产业链节点</div><div>日用消费品产业链 · <span style="color:#3ad4ff;font-weight:600">PBAT</span></div>'+
      '<div>所在地区</div><div>'+c.prov+' '+c.city+'</div>'+
      '<div>成立日期</div><div>'+c.founded+'</div>'+
      '<div>登记状态</div><div><span style="color:#42d29a">存续（在营、开业、在册）</span></div>'+
      '<div>企业类型</div><div>股份有限公司</div>'+
    '</div>'+
    '<div class="pb-kpi-row" style="grid-template-columns:repeat(4,1fr)">'+
      '<div class="pb-kpi"><div class="lbl">设计产能（合计）</div><div class="val">'+c.cap.toFixed(1)+'<span class="u">万吨/年</span></div><div class="delta up">行业排名 #'+(idx+1)+'</div></div>'+

    if (nd.w) el.style.width = nd.w + 'px';
    el.dataset.info = JSON.stringify(nd);
    el.dataset.id = nd.id;
    el.dataset.name = nd.n;
    // hover 显示节点说明，click 打开在产企业列表
    el.onmouseenter = function(){ showTip(this) };
    el.onmouseleave = function(){ document.getElementById('tt').style.display = 'none' };
    el.onclick = function(){ openChainCompList(this.dataset.id, this.dataset.name) };
    g.appendChild(el);
    nMap[nd.id] = { el, d: nd };
  });

  // 应用区域
  const ab = document.createElement('div');
  ab.className = 'app-area';
  ab.innerHTML = APPS.map(a => `<div class="app-i"><span class="dot"></span>${a}</div>`).join('');
  g.appendChild(ab);

  requestAnimationFrame(() => drawLinks(svg, g));
}

function drawLinks(svg, g){
  const gR = g.getBoundingClientRect();
  let p = '';
  const s = getScale();

  L.forEach(link => {
    const fi = link[0], ti = link[1], type = link[2], hint = link[3], bendOv = link[4];
    const f = nMap[fi], t = nMap[ti];
    if (!f || !t) return;
    const fR = f.el.getBoundingClientRect();
    const tR = t.el.getBoundingClientRect();
    const fx = (fR.left - gR.left) / s, fy = (fR.top - gR.top) / s;
    const fw = fR.width / s, fh = fR.height / s;
    const tx = (tR.left - gR.left) / s, ty = (tR.top - gR.top) / s;
    const tw = tR.width / s, th = tR.height / s;

    const fcx = fx + fw/2, fcy = fy + fh/2;
    const tcx = tx + tw/2, tcy = ty + th/2;
    const dxAbs = Math.abs(tcx - fcx), dyAbs = Math.abs(tcy - fcy);

    const xOverlap = !(fx + fw <= tx || tx + tw <= fx);
    const yOverlap = !(fy + fh <= ty || ty + th <= fy);

    let routing = hint;
    if (!routing) {
      if (yOverlap)      routing = 'h';
      else if (xOverlap) routing = 'v';
      else               routing = (dxAbs >= dyAbs) ? 'h' : 'v';
    }

    let col, w;
    const tc = t.d.c;
    if (tc === 'nd-strong')      { col = 'rgba(230,150,70,.5)';   w = 1.4; }
    else if (tc === 'nd-extend') { col = 'rgba(190,210,90,.42)';  w = 1.3; }
    else if (tc === 'nd-fill')   { col = 'rgba(90,190,210,.42)';  w = 1.3; }
    else                          { col = 'rgba(180,200,220,.3)'; w = 1.2; }

    let pathD;
    if (routing === 'h') {
      let x1, y1, x2, y2;
      if (tcx >= fcx) { x1 = fx + fw; y1 = fcy; x2 = tx;       y2 = tcy; }
      else            { x1 = fx;       y1 = fcy; x2 = tx + tw; y2 = tcy; }
      if (Math.abs(y2 - y1) < 1.5) {
        pathD = `M${x1},${y1} L${x2},${y2}`;
      } else {
        const mx = (bendOv != null) ? bendOv : (x1 + x2) / 2;
        pathD = `M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`;
      }
    } else {
      let x1, y1, x2, y2;
      if (tcy >= fcy) { x1 = fcx; y1 = fy + fh; x2 = tcx; y2 = ty; }
      else            { x1 = fcx; y1 = fy;       x2 = tcx; y2 = ty + th; }
      if (Math.abs(x2 - x1) < 1.5) {
        pathD = `M${x1},${y1} L${x2},${y2}`;
      } else {
        const my = (bendOv != null) ? bendOv : (y1 + y2) / 2;
        pathD = `M${x1},${y1} L${x1},${my} L${x2},${my} L${x2},${y2}`;
      }
    }

    const dash = (type === 'd') ? ' stroke-dasharray="5 4"' : '';
    const marker = (type === 'd') ? ' marker-end="url(#arr-d)"' : ' marker-end="url(#arr)"';
    p += `<path d="${pathD}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linejoin="miter"${dash}${marker}/>`;
  });

  // 末端节点 → 应用区域 虚线
  APP_LINKS.forEach(id => {
    const nd = nMap[id];
    if (!nd) return;
    const fR = nd.el.getBoundingClientRect();
    const x1 = (fR.right - gR.left) / s;
    const y1 = (fR.top + fR.height/2 - gR.top) / s;
    p += `<path d="M${x1},${y1} L1055,${y1}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1" stroke-dasharray="4 3"/>`;
  });

  svg.innerHTML = svg.querySelector('defs').outerHTML + p;
}

function getScale(){
  const g = document.getElementById('graph');
  const t = getComputedStyle(g).transform;
  if (t === 'none') return 1;
  const m = t.match(/matrix\(([^)]+)\)/);
  return m ? parseFloat(m[1].split(',')[0]) : 1;
}

function showTip(el){
  const d = JSON.parse(el.dataset.info);
  const cm = {
    'nd-strong': { l: '现有产业强链', c: '#f59e3a' },
    'nd-extend': { l: '上下游延链',   c: '#bef264' },
    'nd-fill':   { l: '短板环节补链', c: '#67e8f9' },
    'nd-out':    { l: '环节节点',     c: '#cbd5e1' }
  };
  const cfg = cm[d.c] || { l: '', c: '#aaa' };
  const tt = document.getElementById('tt');
  tt.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <span style="width:8px;height:8px;border-radius:2px;background:${cfg.c};display:inline-block"></span>
      <span style="font-size:10px;color:#4a7a9a">${cfg.l}</span>
    </div>
    <div style="font-size:13px;font-weight:700;color:${cfg.c};margin-bottom:6px">${d.n}</div>
    <div style="font-size:11.5px;color:#a0b8d0;line-height:1.65">${d.d}</div>
  `;
  tt.style.display = 'block';
  const r = el.getBoundingClientRect();
  tt.style.left = Math.min(r.right + 10, window.innerWidth - 300) + 'px';
  tt.style.top = Math.max(r.top - 15, 8) + 'px';
}

document.addEventListener('click', e => {
  if (!e.target.closest('.nd')) document.getElementById('tt').style.display = 'none';
});

window.addEventListener('resize', () => {
  if (document.getElementById('view-original').style.display === 'none') return;
  const g = document.getElementById('graph');
  g.querySelectorAll('.nd, .app-area').forEach(e => e.remove());
  Object.keys(nMap).forEach(k => delete nMap[k]);
  const svg = document.getElementById('svg');
  svg.innerHTML = svg.querySelector('defs').outerHTML;
  init();
});

/* 图片视图：缩放 + 拖拽 */
const imgZP = (()=>{
  const state = {scale:1, tx:0, ty:0, dragging:false, sMX:0, sMY:0, sTX:0, sTY:0, natW:0, natH:0};
  const apply = ()=>{
    const im = document.getElementById('chainImg');
    if (!im) return;
    im.style.transform = `translate(${state.tx}px,${state.ty}px) scale(${state.scale})`;
    const pct = document.getElementById('imgZoomPct');
    if (pct) pct.textContent = Math.round(state.scale*100) + '%';
  };
  const fit = ()=>{
    const wrap = document.getElementById('imgWrap');
    if (!wrap || !state.natW) return;
    const PAD = 40;
    const availW = Math.max(100, wrap.clientWidth  - PAD*2);
    const availH = Math.max(100, wrap.clientHeight - PAD*2);
    const s = Math.min(availW / state.natW, availH / state.natH, 1);
    state.scale = s;
    state.tx = (wrap.clientWidth  - state.natW * s) / 2;
    state.ty = (wrap.clientHeight - state.natH * s) / 2;
    apply();
  };
  const zoomAt = (mx,my,f)=>{
    const ns = Math.max(0.05, Math.min(8, state.scale*f));
    if (ns === state.scale) return;
    state.tx = mx - (mx - state.tx) * (ns / state.scale);
    state.ty = my - (my - state.ty) * (ns / state.scale);
    state.scale = ns; apply();
  };
  const setup = ()=>{
    const wrap = document.getElementById('imgWrap');
    if (!wrap || wrap.dataset.zpInited) return;
    wrap.dataset.zpInited = '1';
    wrap.addEventListener('wheel', e=>{
      e.preventDefault();
      const r = wrap.getBoundingClientRect();
      const f = e.deltaY < 0 ? 1.12 : 1/1.12;
      zoomAt(e.clientX - r.left, e.clientY - r.top, f);
    }, {passive:false});
    wrap.addEventListener('mousedown', e=>{
      if (e.button !== 0) return;
      state.dragging = true; state.sMX = e.clientX; state.sMY = e.clientY;
      state.sTX = state.tx; state.sTY = state.ty;
      wrap.classList.add('dragging'); e.preventDefault();
    });
    window.addEventListener('mousemove', e=>{
      if (!state.dragging) return;
      state.tx = state.sTX + (e.clientX - state.sMX);
      state.ty = state.sTY + (e.clientY - state.sMY);
      apply();
    });
    window.addEventListener('mouseup', ()=>{
      if (!state.dragging) return;
      state.dragging = false; wrap.classList.remove('dragging');
    });
    const center = ()=>{ const r = wrap.getBoundingClientRect(); return {x:r.width/2, y:r.height/2}; };
    document.getElementById('imgZoomIn').addEventListener('click', ()=>{ const c=center(); zoomAt(c.x,c.y,1.2); });
    document.getElementById('imgZoomOut').addEventListener('click', ()=>{ const c=center(); zoomAt(c.x,c.y,1/1.2); });
    document.getElementById('imgZoomFit').addEventListener('click', fit);
  };
  return {state, setup, fit, setNat:(w,h)=>{ state.natW=w; state.natH=h; fit(); }};
})();
function loadChainImg(src, title){
  imgZP.setup();
  document.getElementById('imgTitle').textContent = title;
  const im = document.getElementById('chainImg');
  im.onload = ()=>{ imgZP.setNat(im.naturalWidth, im.naturalHeight); };
  im.src = src;
  if (im.complete && im.naturalWidth) imgZP.setNat(im.naturalWidth, im.naturalHeight);
}

/* 通用：图谱缩放 + 拖拽控制器 */
function createZoomPan(opts){
  // opts: { wrapId, graphId, baseW, baseH, btnInId, btnOutId, btnFitId, pctId, min, max }
  const MIN = opts.min || 0.05, MAX = opts.max || 3;
  const state = { scale: 1, tx: 0, ty: 0, dragging:false, sMX:0, sMY:0, sTX:0, sTY:0 };

  function apply(){
    const g = document.getElementById(opts.graphId);
    if (!g) return;
    g.style.transform = 'translate(' + state.tx + 'px,' + state.ty + 'px) scale(' + state.scale + ')';
    const pct = opts.pctId && document.getElementById(opts.pctId);
    if (pct) pct.textContent = Math.round(state.scale * 100) + '%';
  }
  function fit(){
    const wrap = document.getElementById(opts.wrapId);
    if (!wrap) return;
    const PAD = 24;
    let s;
    if (opts.initScale) {
      // 固定初始缩放：内容窄于视口则居中，宽于视口则顶左留 PAD（方便从头读）
      s = opts.initScale;
      state.scale = s;
      state.tx = opts.baseW * s <= wrap.clientWidth  - PAD*2
        ? (wrap.clientWidth  - opts.baseW * s) / 2 : PAD;
      state.ty = opts.baseH * s <= wrap.clientHeight - PAD*2
        ? (wrap.clientHeight - opts.baseH * s) / 2 : PAD;
    } else {
      // 整图 fit 模式
      const availW = Math.max(100, wrap.clientWidth  - PAD*2);
      const availH = Math.max(100, wrap.clientHeight - PAD*2);
      s = Math.min(availW / opts.baseW, availH / opts.baseH, 1);
      state.scale = s;
      state.tx = (wrap.clientWidth  - opts.baseW * s) / 2;
      state.ty = (wrap.clientHeight - opts.baseH * s) / 2;
    }
    apply();
  }
  function zoomAt(mx, my, factor){
    const newScale = Math.max(MIN, Math.min(MAX, state.scale * factor));
    if (newScale === state.scale) return;
    state.tx = mx - (mx - state.tx) * (newScale / state.scale);
    state.ty = my - (my - state.ty) * (newScale / state.scale);
    state.scale = newScale;
    apply();
  }
  function setup(){
    const wrap = document.getElementById(opts.wrapId);
    if (!wrap || wrap.dataset.zpInited) return;
    wrap.dataset.zpInited = '1';

    // 滚轮缩放（以鼠标位置为中心）
    wrap.addEventListener('wheel', e => {
      e.preventDefault();
      const r = wrap.getBoundingClientRect();
      const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
      zoomAt(e.clientX - r.left, e.clientY - r.top, factor);
    }, { passive: false });

    // 拖拽平移（避开节点 / 边标签 / 应用区，让它们正常响应点击）
    wrap.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      if (e.target.closest('.nd, .nd2, .eg-lbl, .app-area')) return;
      state.dragging = true;
      state.sMX = e.clientX; state.sMY = e.clientY;
      state.sTX = state.tx; state.sTY = state.ty;
      wrap.classList.add('dragging');
      e.preventDefault();
    });
    window.addEventListener('mousemove', e => {
      if (!state.dragging) return;
      state.tx = state.sTX + (e.clientX - state.sMX);
      state.ty = state.sTY + (e.clientY - state.sMY);
      apply();
    });
    window.addEventListener('mouseup', () => {
      if (!state.dragging) return;
      state.dragging = false;
      wrap.classList.remove('dragging');
    });

    // 控件按钮
    const center = () => {
      const r = wrap.getBoundingClientRect();
      return { x: r.width/2, y: r.height/2 };
    };
    const bIn  = opts.btnInId  && document.getElementById(opts.btnInId);
    const bOut = opts.btnOutId && document.getElementById(opts.btnOutId);
    const bFit = opts.btnFitId && document.getElementById(opts.btnFitId);
    if (bIn)  bIn.addEventListener('click',  () => { const c = center(); zoomAt(c.x, c.y, 1.2); });
    if (bOut) bOut.addEventListener('click', () => { const c = center(); zoomAt(c.x, c.y, 1/1.2); });
    if (bFit) bFit.addEventListener('click', fit);
  }
  return { state, fit, zoomAt, setup };
}

    el.style.top = nd.y + 'px';
    if (nd.w) el.style.width = nd.w + 'px';
    if (nd.h) el.style.height = nd.h + 'px';
    if (nd.dashed) el.style.borderStyle = 'dashed';
    el.dataset.id = nd.id;
    el.dataset.name = nd.n;
    el.title = nd.n + ' · 点击查看在产企业列表';
    el.onclick = function(){ openChainCompList(this.dataset.id, this.dataset.name) };
    g.appendChild(el);
  });

  // 用真实 bbox 画线，避免硬编码
  const mp = {};
  g.querySelectorAll('.nd2').forEach((el, i) => {
    const nd = N2[i];
    const r = el.getBoundingClientRect();
    mp[nd.id] = {el, x: nd.x, y: nd.y, w: el.offsetWidth, h: el.offsetHeight, dashed: nd.dashed};
  });

  let p = '';
  const labels = [];   // 待添加的边标签
  const draw = (fi, ti, opts) => {
    const f = mp[fi], t = mp[ti];
    if (!f || !t) return;
    opts = opts || {};
    const x1 = f.x + f.w, y1 = f.y + f.h/2;
    const x2 = t.x,        y2 = t.y + t.h/2;
    const mx = (x1 + x2) / 2;
    const isRed = opts.red || f.dashed || t.dashed;
    const stroke = isRed ? '#e0463a' : 'rgba(110,120,135,.55)';
    const dash = isRed ? ' stroke-dasharray="4 3"' : '';
    const marker = isRed ? 'arr2r' : 'arr2';
    if (Math.abs(y2 - y1) < 1) {
      p += `<path d="M${x1},${y1} L${x2},${y2}" fill="none" stroke="${stroke}" stroke-width="1.1"${dash} marker-end="url(#${marker})"/>`;
    } else {
      p += `<path d="M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}" fill="none" stroke="${stroke}" stroke-width="1.1"${dash} marker-end="url(#${marker})"/>`;
    }
    // 边标签：水平段中点上下放置
    if (opts.eq || opts.rg) {
      const lx = (x1 + x2) / 2;
      const ly = Math.min(y1, y2) + Math.abs(y2 - y1)/2;
      labels.push({x: lx, y: y1, eq: opts.eq, rg: opts.rg});
    }
  };
  L2.forEach(link => {
    const [f, t, opt] = link;
    draw(f, t, opt);
  });
  // 应用扇形（虚线点状）
  APP_FAN.forEach(([f, t]) => {
    const a = mp[f], b = mp[t];
    if (!a || !b) return;
    const x1 = a.x + a.w, y1 = a.y + a.h/2;
    const x2 = b.x,       y2 = b.y + b.h/2;
    const mx = (x1 + x2) / 2;
    p += `<path d="M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}" fill="none" stroke="rgba(140,140,160,.3)" stroke-width=".8" stroke-dasharray="2 3"/>`;
  });

  svg.innerHTML = svg.querySelector('defs').outerHTML + p;

  // 边标签 div
  labels.forEach(l => {
    const div = document.createElement('div');
    div.className = 'eg-lbl';
    let html = '';
    if (l.eq) html += `<div class="eq">${l.eq}</div>`;
    if (l.rg) html += `<div class="rg">${l.rg}</div>`;
    div.innerHTML = html;
    div.style.left = (l.x - 70) + 'px';
    div.style.top = (l.y - 22) + 'px';
    div.style.width = '140px';
    g.appendChild(div);
  });
}


</script>
